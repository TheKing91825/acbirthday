<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abhay Chauhan | AC Family 🎉</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-image:
        radial-gradient(circle at 90% 50%, rgba(56, 189, 248, 0.15) 0%, transparent 50%),
        linear-gradient(to bottom, transparent 40%, rgba(255, 255, 255, 0.03) 40%, rgba(255, 255, 255, 0.03) 60%, transparent 60%);
    }
  </style>
</head>

<body>

  <!-- Navigation -->
  <nav>
    <div class="nav-logo">🎉 AC Family</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="ajit.html">Ajit</a>
      <a href="alka.html">Alka</a>
      <a href="abhay.html" class="active">Abhay</a>
      <a href="akshay.html">Akshay</a>
    </div>
  </nav>

  <!-- Background Decorations -->
  <div class="balloon-container" data-count="6"></div>

  <!-- Hero Section -->
  <header class="hero container fade-in">
    <h1 style="color: var(--color-blue);">Abhay Chauhan 🌍</h1>
    <div
      style="font-size: 8rem; font-family: var(--font-heading); color: var(--color-blue); line-height: 1; text-shadow: 0 4px 20px var(--color-blue-glow); margin-bottom: var(--space-sm);">
      19</div>
    <p class="subheading">The Explorer</p>

    <!-- Main Photo Placeholder -->
    <div class="photo-placeholder photo-hero"
      style="padding: 0; border: none; background: transparent; border-color: rgba(56, 189, 248, 0.4);">
      <img src="assets/images/abhay/IMG_8552.JPG" alt="Abhay's Photo"
        style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;">
    </div>
  </header>

  <!-- Gallery Section -->
  <section class="container fade-in">
    <h2 style="color: var(--color-blue);">Photo Gallery</h2>
    <div class="gallery">
      <div class="photo-placeholder" style="padding: 0; border: none;">
        <img src="assets/images/abhay/IMG_0601.HEIC" alt="Photo 1"
          style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;">
      </div>
      <div class="photo-placeholder" style="padding: 0; border: none;">
        <img src="assets/images/abhay/IMG_4203.HEIC" alt="Photo 2"
          style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;">
      </div>
      <div class="photo-placeholder" style="padding: 0; border: none;">
        <img src="assets/images/abhay/IMG_5539-1.jpg" alt="Photo 3"
          style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;">
      </div>
      <div class="photo-placeholder" style="padding: 0; border: none; background: transparent;">
        <img src="assets/images/abhay/IMG_0871.jpg" alt="Photo 4"
          style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;">
      </div>
      <div class="photo-placeholder" style="padding: 0; border: none; background: transparent;">
        <img src="assets/images/abhay/IMG_4054.JPG" alt="Photo 5"
          style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;">
      </div>
      <div class="photo-placeholder" style="padding: 0; border: none; background: transparent;">
        <img src="assets/images/abhay/IMG_8575.JPG" alt="Photo 6"
          style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;">
      </div>
    </div>
  </section>

  <div class="container fade-in" style="text-align: center; margin: var(--space-xl) auto;">
    <a href="index.html" class="btn" style="background: rgba(255,255,255,0.1); color: white;">&larr; Back to Home</a>
  </div>

  <!-- Footer -->
  <footer>
    <p>Made with ❤️ for the Chauhan Family &middot; <span>AC Family 🎉</span> &middot; 2026</p>
  </footer>

  <script src="main.js"></script>
</body>

</html>
